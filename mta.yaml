_schema-version: "3.1"
ID: btp-iflow-manager
version: 1.0.0
description: BTP Integration Suite iFlow Manager

modules:

  # ── 1. React frontend (built as static HTML/JS/CSS) ─────────────────────────
  - name: btp-iflow-manager-ui
    type: html5
    path: .
    build-parameters:
      builder: custom
      build-result: build
      commands:
        - npm install
        - npm run build
      supported-platforms: []

  # ── 2. Approuter (handles auth + routes traffic to the UI and the backend) ──
  - name: btp-iflow-manager-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
    build-parameters:
      builder: npm
    requires:
      - name: btp-iflow-manager-xsuaa
      - name: btp-iflow-manager-destination
      - name: btp-iflow-manager-ui
        parameters:
          content-target: true
    provides:
      - name: approuter-url
        properties:
          url: ${default-url}

  # ── 3. Backend API proxy (Node.js — fetches tokens, calls Integration Suite) ─
  - name: btp-iflow-manager-srv
    type: nodejs
    path: proxy
    parameters:
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    requires:
      - name: btp-iflow-manager-xsuaa
      - name: btp-iflow-manager-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

resources:

  # ── XSUAA: handles user login / JWT tokens ───────────────────────────────────
  - name: btp-iflow-manager-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  # ── Destination Service: holds Integration Suite credentials ─────────────────
  - name: btp-iflow-manager-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
