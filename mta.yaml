_schema-version: "3.1"
ID: btp-iflow-manager
version: 1.0.0
description: BTP Integration Suite iFlow Manager

modules:

  # ── 1. Approuter (serves the React build + handles auth + routes to backend) ─
  #       The React app is built into approuter/resources/ before deploy.
  - name: btp-iflow-manager-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: custom
      commands:
        - npm install
      supported-platforms: []
    requires:
      - name: btp-iflow-manager-xsuaa
      - name: btp-iflow-manager-destination
      - name: srv-api
    provides:
      - name: approuter-url
        properties:
          url: ${default-url}

  # ── 2. Backend API proxy (Node.js — fetches tokens, calls Integration Suite) ─
  - name: btp-iflow-manager-srv
    type: nodejs
    path: proxy
    parameters:
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
      supported-platforms: []
    requires:
      - name: btp-iflow-manager-xsuaa
      - name: btp-iflow-manager-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

resources:

  # ── XSUAA: handles user login / JWT tokens ───────────────────────────────────
  - name: btp-iflow-manager-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  # ── Destination Service: holds Integration Suite credentials ─────────────────
  - name: btp-iflow-manager-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
